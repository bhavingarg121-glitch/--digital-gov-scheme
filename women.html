<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Women Schemes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<script>
function toggleContent(id){
const all=document.querySelectorAll('.scheme-details');
all.forEach(s=>{ if(s.id!==id) s.classList.add('hidden'); });
document.getElementById(id).classList.toggle('hidden');
}
</script>
</head>

<body class="bg-pink-50">

<header class="bg-pink-600 text-white p-4">
<h1>Women Schemes</h1>
</header>

<main class="p-6 space-y-6">

<div class="bg-white shadow rounded">
<div class="p-4 flex justify-between">
<h3>Beti Bachao Beti Padhao</h3>
<button onclick="toggleContent('w1')">View</button>
</div>
<div id="w1" class="hidden p-4">
<p>Girl child welfare program.</p>
</div>
</div>

</main>
</body>
</html>
