<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheme Sathi</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* ---------- GLOBAL ---------- */
body {
  font-family: 'Segoe UI', sans-serif;
}

/* ---------- SIDEBAR ---------- */
.sidebar {
  width: 230px;
  background: #1e293b;
  color: white;
  position: fixed;
  height: 100%;
  padding: 20px;
}

.sidebar a {
  display: block;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 8px;
}

.sidebar a:hover {
  background: #334155;
}

/* ---------- MAIN ---------- */
.main {
  margin-left: 230px;
}

/* ---------- CARD ---------- */
.scheme-card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  transition: 0.3s;
}

.scheme-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

/* ---------- GRADIENT CARD ---------- */
.glass {
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  border-radius: 12px;
}

/* ---------- LOADER ---------- */
.loader {
  display: flex;
  justify-content: center;
  padding: 30px;
}

.spinner {
  border: 4px solid #eee;
  border-top: 4px solid #2563eb;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

</style>
</head>

<body class="bg-gray-100">

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
  <h2 class="text-xl font-bold mb-6">Scheme Sathi</h2>

  <a href="#">🏠 Dashboard</a>
  <a href="#">📋 All Schemes</a>
  <a href="#">⭐ Bookmarks</a>
  <a href="#">👤 Profile</a>
  <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

<!-- NAVBAR -->
<div class="bg-white shadow p-4 flex justify-between items-center">

  <input id="searchInput"
    placeholder="Search schemes..."
    class="border px-3 py-2 rounded w-64">

  <div id="userArea"></div>

</div>

<!-- HERO -->
<div class="p-6">

  <div class="glass p-6 mb-6">
    <h1 class="text-3xl font-bold">Welcome to Scheme Sathi</h1>
    <p class="opacity-90 mt-2">Explore 500+ government schemes easily</p>

    <button id="loadSchemes"
      class="mt-4 bg-white text-blue-600 px-5 py-2 rounded">
      Load Schemes
    </button>
  </div>

  <!-- STATS -->
  <div class="grid md:grid-cols-3 gap-4 mb-6">
    <div class="scheme-card">📊 500+ Schemes</div>
    <div class="scheme-card">👥 10K Users</div>
    <div class="scheme-card">⭐ 4.8 Rating</div>
  </div>

  <!-- SCHEMES -->
  <div id="scheme-cards" class="grid md:grid-cols-3 gap-6"></div>

</div>

</div>

<!-- ================= SCRIPT ================= -->
<script>

let allSchemes = [];

/* AUTH CHECK */
const token = localStorage.getItem("token");
const guest = localStorage.getItem("guest");

if (!token && !guest) {
  window.location.href = "login.html";
}

/* USER UI */
const userArea = document.getElementById("userArea");

if (token) {
  userArea.innerHTML = `
    <div class="flex items-center gap-3">
      <span class="font-semibold">User</span>
      <button onclick="logout()" class="text-red-500">Logout</button>
    </div>
  `;
} else {
  userArea.innerHTML = `
    <span class="text-gray-500">Guest Mode</span>
  `;
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("guest");
  window.location.href = "login.html";
}

/* LOAD SCHEMES */
document.getElementById("loadSchemes").addEventListener("click", () => {

  const container = document.getElementById("scheme-cards");

  container.innerHTML = `
    <div class="loader col-span-3">
      <div class="spinner"></div>
    </div>
  `;

  fetch("schemes.json")
    .then(res => res.json())
    .then(data => {
      allSchemes = data;
      displaySchemes(data);
    })
    .catch(() => {
      container.innerHTML = "<p>Error loading data</p>";
    });
});

/* DISPLAY */
function displaySchemes(data) {
  const container = document.getElementById("scheme-cards");
  container.innerHTML = "";

  data.forEach(s => {
    container.innerHTML += `
      <div class="scheme-card">
        <h3 class="font-bold text-lg">${s.name}</h3>
        <p class="text-gray-600">${s.description}</p>
        <span class="text-sm text-gray-500">${s.category}</span>

        <button onclick="bookmark('${s.name}')"
          class="mt-3 text-blue-600">
          ⭐ Save
        </button>
      </div>
    `;
  });
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", (e) => {

  const val = e.target.value.toLowerCase();

  const filtered = allSchemes.filter(s =>
    s.name.toLowerCase().includes(val)
  );

  displaySchemes(filtered);
});

/* BOOKMARK */
function bookmark(name) {
  if (!token) {
    alert("Login required to save");
    return;
  }

  let saved = JSON.parse(localStorage.getItem("saved") || "[]");

  if (!saved.includes(name)) {
    saved.push(name);
  }

  localStorage.setItem("saved", JSON.stringify(saved));

  alert("Saved!");
}

</script>

</body>
</html>
