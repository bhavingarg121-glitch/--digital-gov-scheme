<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheme Sathi Portal</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background: #f0f4f8; }

    .scheme-card {
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .scheme-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    }

    #hero {
      background: linear-gradient(135deg, #4f46e5, #3b82f6);
      color: white;
    }
  </style>
</head>

<body class="text-gray-800 font-sans">

<!-- HEADER -->
<header class="bg-white shadow sticky top-0 z-50">
  <div class="container mx-auto flex justify-between items-center px-4 py-4">
    <div class="text-2xl font-bold text-blue-600">Scheme Sathi</div>
    <nav class="space-x-6">
      <a href="#hero">Home</a>
      <a href="#schemes-section">Schemes</a>
      <a href="#news-section">News</a>
      <a href="#contact-section">Contact</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section id="hero" class="py-20 text-center">
  <h1 class="text-4xl font-bold mb-4">
    Empowering Citizens with Government Schemes
  </h1>

  <p class="mb-6">
    Access scholarships, subsidies, pensions, and benefits easily
  </p>

  <button id="loadSchemes"
    class="px-6 py-3 bg-white text-blue-600 rounded shadow hover:bg-gray-200">
    Load Schemes
  </button>
</section>

<!-- SCHEMES -->
<section id="schemes-section" class="py-12">
  <div class="container mx-auto px-4">

    <h2 class="text-3xl font-bold text-center mb-6">
      Explore Government Schemes
    </h2>

    <div id="scheme-cards"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

      <!-- default cards -->
      <div class="scheme-card bg-white p-6 rounded shadow">
        <h3 class="text-xl font-semibold">National Scholarship Portal</h3>
        <p>Apply for scholarships easily.</p>
      </div>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="bg-white mt-12 shadow py-6 text-center">
  © 2026 Scheme Sathi
</footer>

<!-- SCRIPT (FIXED) -->
<script>
let allSchemes = [];

// BUTTON CLICK
document.getElementById("loadSchemes").addEventListener("click", () => {

  fetch("http://127.0.0.1:5000/api/schemes")
    .then(res => res.json())
    .then(data => {
      allSchemes = data;
      displaySchemes(data);
    })
    .catch(err => {
      console.log("Error:", err);
      alert("Backend not running!");
    });

});

// DISPLAY FUNCTION
function displaySchemes(data) {
  const container = document.getElementById("scheme-cards");
  container.innerHTML = "";

  data.forEach(s => {
    container.innerHTML += `
      <div class="scheme-card bg-white p-6 rounded shadow">
        <h3 class="text-xl font-semibold">${s.name}</h3>
        <p class="text-gray-600">${s.description || "No description"}</p>
        <a href="${s.link}" target="_blank"
           class="text-blue-500">View</a>
      </div>
    `;
  });
}
</script>

</body>
</html>
