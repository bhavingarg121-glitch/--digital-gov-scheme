<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheme Sathi</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background: #f0f4f8; }

    .scheme-card {
      transition: all 0.3s ease;
    }

    .scheme-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 30px rgba(59,130,246,0.3);
    }

    #hero {
      background: linear-gradient(135deg, #4f46e5, #3b82f6);
      color: white;
    }
  </style>
</head>

<body class="text-gray-800 font-sans">

<!-- 🔷 HEADER -->
<header class="bg-white shadow sticky top-0 z-50">
  <div class="container mx-auto flex justify-between px-4 py-4">
    <h1 class="text-2xl font-bold text-blue-600">Scheme Sathi</h1>
  </div>
</header>

<!-- 🔥 HERO -->
<section id="hero" class="py-24 text-center">
  <h1 class="text-5xl font-bold mb-4">
    Empowering Citizens with Government Schemes
  </h1>
  <p class="mb-6">Access benefits easily</p>

  <button id="loadSchemes"
    class="px-6 py-3 bg-white text-blue-600 rounded shadow hover:bg-gray-100">
    Load Schemes
  </button>
</section>

<!-- 📦 SCHEMES -->
<section id="schemes-section" class="p-6">

  <!-- 🔍 Search + Dropdown -->
  <div class="flex justify-center gap-4 mb-6 flex-wrap">
    <input id="searchInput" type="text" placeholder="Search schemes..."
      class="border p-2 rounded w-60">

    <select id="categoryFilter" class="border p-2 rounded">
      <option value="all">All Categories</option>
    </select>
  </div>

  <!-- 🎯 Category Buttons -->
  <div class="flex justify-center gap-3 flex-wrap mb-6">
    <button class="cat-btn bg-blue-500 text-white px-3 py-1 rounded" data-cat="all">All</button>
    <button class="cat-btn bg-green-500 text-white px-3 py-1 rounded" data-cat="Education">Education</button>
    <button class="cat-btn bg-yellow-400 text-black px-3 py-1 rounded" data-cat="Health">Health</button>
    <button class="cat-btn bg-purple-500 text-white px-3 py-1 rounded" data-cat="Pension">Pension</button>
    <button class="cat-btn bg-pink-500 text-white px-3 py-1 rounded" data-cat="Women">Women</button>
  </div>

  <!-- 🧾 Cards -->
  <div id="scheme-cards" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

    <!-- 🌟 Example Cards (shown before load) -->
    <div class="scheme-card bg-white p-5 rounded shadow">
      <h3 class="font-bold text-blue-700">National Scholarship Portal</h3>
      <p class="text-gray-600">Apply for scholarships easily.</p>
    </div>

    <div class="scheme-card bg-white p-5 rounded shadow">
      <h3 class="font-bold text-blue-700">Ayushman Bharat</h3>
      <p class="text-gray-600">Health coverage up to ₹5 lakh.</p>
    </div>

  </div>

  <!-- 📄 Pagination -->
  <div class="flex justify-center gap-4 mt-6">
    <button id="prevPageBtn" class="bg-gray-300 px-4 py-2 rounded">Prev</button>
    <span id="pageNumber"></span>
    <button id="nextPageBtn" class="bg-gray-300 px-4 py-2 rounded">Next</button>
  </div>

</section>

<!-- 🔻 FOOTER -->
<footer class="bg-white text-center py-6 mt-10 shadow">
  © 2026 Scheme Sathi
</footer>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const button = document.getElementById("loadSchemes");
  const container = document.getElementById("scheme-cards");
  const searchInput = document.getElementById("searchInput");
  const categoryFilter = document.getElementById("categoryFilter");
  const catButtons = document.querySelectorAll(".cat-btn");

  let allSchemes = [];
  let filteredSchemes = [];
  let currentPage = 1;
  const perPage = 20;

  // 🚀 LOAD DATA
  button.addEventListener("click", () => {
    fetch("http://127.0.0.1:5000/api/schemes")
      .then(res => res.json())
      .then(data => {
        allSchemes = data;
        filteredSchemes = data;
        currentPage = 1;

        loadCategories();
        displayPage();

        document.getElementById("schemes-section").scrollIntoView({
          behavior: "smooth"
        });
      });
  });

  // 🏷 CATEGORY DROPDOWN
  function loadCategories() {
    const categories = [...new Set(allSchemes.map(s => s.category || "Other"))];

    categoryFilter.innerHTML = `<option value="all">All</option>`;
    categories.forEach(cat => {
      categoryFilter.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
  }

  // 🔍 SEARCH + DROPDOWN FILTER
  searchInput.addEventListener("input", applyFilters);
  categoryFilter.addEventListener("change", applyFilters);

  // 🎯 BUTTON FILTER
  catButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      categoryFilter.value = btn.dataset.cat;
      applyFilters();
    });
  });

  function applyFilters() {
    const keyword = searchInput.value.toLowerCase();
    const selectedCategory = categoryFilter.value;

    filteredSchemes = allSchemes.filter(s => {
      return (
        s.name.toLowerCase().includes(keyword) &&
        (selectedCategory === "all" || s.category === selectedCategory)
      );
    });

    currentPage = 1;
    displayPage();
  }

  // 📄 DISPLAY
  function displayPage() {
    container.innerHTML = "";

    const start = (currentPage - 1) * perPage;
    const pageData = filteredSchemes.slice(start, start + perPage);

    pageData.forEach(s => {
      container.innerHTML += `
        <div class="scheme-card bg-white p-5 rounded shadow">
          <h3 class="font-bold text-blue-700">${s.name}</h3>
          <p class="text-gray-600">${s.description || "No description"}</p>
          <p class="text-sm text-gray-400">${s.category || "Other"}</p>
          <a href="${s.link}" target="_blank"
            class="inline-block mt-2 text-blue-600">View</a>
        </div>
      `;
    });

    const totalPages = Math.ceil(filteredSchemes.length / perPage);
    document.getElementById("pageNumber").innerText =
      `${currentPage} / ${totalPages}`;

    prevPageBtn.disabled = currentPage === 1;
    nextPageBtn.disabled = currentPage === totalPages;
  }

  // 🔁 PAGINATION
  nextPageBtn.onclick = () => {
    currentPage++;
    displayPage();
  };

  prevPageBtn.onclick = () => {
    currentPage--;
    displayPage();
  };

});
</script>

</body>
</html>
