<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SchemeSathi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
  <header class="bg-blue-600 text-white p-4">
    <h1 class="text-2xl font-bold">SchemeSathi</h1>
    <p class="text-sm">Explore government schemes easily</p>
  </header>

  <main class="p-6">
    <h2 class="text-xl font-semibold mb-4">Available Schemes</h2>
    <div id="schemes" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3"></div>
  </main>

  <script>
    fetch("http://127.0.0.1:5000/schemes")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("schemes");
        container.innerHTML = "";
        data.forEach(scheme => {
          container.innerHTML += `
            <div class="bg-white shadow-md rounded p-4">
              <h3 class="text-lg font-bold">${scheme.name}</h3>
              <p class="text-sm mb-2">${scheme.description}</p>
              <a href="${scheme.link}" target="_blank" class="text-blue-600 underline">Learn More</a>
            </div>
          `;
        });
      })
      .catch(err => console.error("Error loading schemes:", err));
  </script>
</body>
</html>
