<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scheme Sathi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<!-- HEADER -->
<header class="bg-white shadow p-4 flex justify-between">
  <h1 class="text-2xl font-bold text-blue-600">Scheme Sathi</h1>
  <nav class="space-x-4">
    <a href="#hero">Home</a>
    <a href="#schemes">Schemes</a>
  </nav>
</header>

<!-- HERO -->
<section id="hero" class="text-center py-16 bg-blue-500 text-white">
  <h2 class="text-4xl font-bold mb-4">
    Empowering Citizens with Government Schemes
  </h2>
  <p class="mb-6">
    Access scholarships, pensions, and benefits easily
  </p>

  <!-- BUTTON -->
  <button id="loadSchemes"
    class="bg-white text-blue-600 px-6 py-2 rounded shadow hover:bg-gray-200">
    Load Schemes
  </button>
</section>

<!-- SEARCH -->
<div class="text-center my-6">
  <input id="searchInput"
    type="text"
    placeholder="Search schemes..."
    class="px-4 py-2 border rounded w-80">
</div>

<!-- SCHEMES -->
<section id="schemes" class="p-6">
  <div id="scheme-cards"
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    <!-- Data will come here -->
    
  </div>
</section>

<!-- FOOTER -->
<footer class="bg-white text-center p-4 mt-10 shadow">
  © 2026 Scheme Sathi
</footer>

<!-- SCRIPT -->
<script>
let allSchemes = [];

// LOAD BUTTON CLICK
document.getElementById("loadSchemes").addEventListener("click", () => {
  fetch("http://127.0.0.1:5000/api/schemes")
    .then(res => res.json())
    .then(data => {
      allSchemes = data;
      displaySchemes(data);
    })
    .catch(err => {
      console.log("Error:", err);
      alert("Backend not running!");
    });
});

// DISPLAY FUNCTION
function displaySchemes(data) {
  const container = document.getElementById("scheme-cards");
  container.innerHTML = "";

  data.forEach(scheme => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded shadow">
        <h3 class="text-lg font-bold mb-2">${scheme.name}</h3>
        <p class="text-gray-600 mb-2">${scheme.description || "No description available"}</p>
        <a href="${scheme.link}" target="_blank"
           class="text-blue-500 underline">View Scheme</a>
      </div>
    `;
  });
}

// SEARCH FUNCTION
document.getElementById("searchInput").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();

  const filtered = allSchemes.filter(s =>
    s.name.toLowerCase().includes(value)
  );

  displaySchemes(filtered);
});
</script>

</body>
</html>
