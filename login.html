
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SchemeSathi</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2,#ff6a00);
  background-size: 300% 300%;
  animation: gradient 8s ease infinite;
}

@keyframes gradient {
  0% {background-position:0%}
  50% {background-position:100%}
  100% {background-position:0%}
}

.glass {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.2);
  border-radius: 1.5rem;
  padding: 2rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="glass w-full max-w-md text-white">

<h1 class="text-3xl font-bold mb-2 text-center">Welcome Back</h1>
<p class="text-center mb-6">Login to SchemeSathi</p>

<form id="loginForm">

<input type="email" id="email" placeholder="Email"
class="w-full p-3 rounded mb-4 text-black" required>

<input type="password" id="password" placeholder="Password"
class="w-full p-3 rounded mb-4 text-black" required>

<p id="error" class="text-red-300 mb-2 hidden"></p>

<button class="w-full bg-purple-600 p-3 rounded hover:bg-purple-700">
Login
</button>

</form>
<a href="forgot.html" class="text-sm underline">
Forgot Password?
</a>
<p class="mt-4 text-center">
Don't have an account?
<a href="register.html" class="underline font-semibold">Register</a>
</p>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const error = document.getElementById("error");

  const user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    error.textContent = "No account found. Please register.";
    error.classList.remove("hidden");
    return;
  }

  if(user.email === email && user.password === password){
    localStorage.setItem("loggedIn", true);
    window.location.href = "explore.html";
  } else {
    error.textContent = "Invalid credentials";
    error.classList.remove("hidden");
  }
});

</script>

</body>
</html>
