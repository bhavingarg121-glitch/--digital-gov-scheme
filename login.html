<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchemeSathi - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-indigo-100 via-blue-50 to-indigo-200">

  <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold text-center text-indigo-700 mb-6">
      SchemeSathi Login
    </h2>

    <!-- Phone/Email Input -->
    <input
      type="text"
      id="phone"
      placeholder="Enter phone/email"
      class="w-full px-4 py-2 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-400"
    />

    <!-- OTP Input -->
    <input
      type="text"
      id="otp"
      placeholder="Enter OTP"
      class="w-full px-4 py-2 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-400"
    />

    <!-- Buttons -->
    <div class="space-y-3">
      <button onclick="sendOtp()" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">
        Send OTP
      </button>
      <button onclick="verifyOtp()" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
        Verify OTP
      </button>
      <button onclick="registerUser()" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Register
      </button>
      <button onclick="skipLogin()" class="w-full text-gray-600 underline hover:text-indigo-600">
        Skip for now
      </button>
    </div>
  </div>

  <script>
    async function sendOtp() {
      const phone = document.getElementById("phone").value;
      const res = await fetch("/api/send-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone })
      });
      const data = await res.json();
      alert(data.message);
    }

    async function verifyOtp() {
      const phone = document.getElementById("phone").value;
      const otp = document.getElementById("otp").value;
      const res = await fetch("/api/verify-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone, otp })
      });
      const data = await res.json();
      if (data.success) {
        alert("Login successful!");
        window.location.href = "dashboard.html"; // redirect to interface
      } else {
        alert("Invalid OTP.");
      }
    }

    async function registerUser() {
      const phone = document.getElementById("phone").value;
      const res = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone })
      });
      const data = await res.json();
      alert(data.message);
    }

    function skipLogin() {
      alert("Guest mode activated.");
      window.location.href = "dashboard.html"; // limited access interface
    }
  </script>
</body>
</html>
