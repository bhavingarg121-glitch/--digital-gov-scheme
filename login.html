<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #e6eef8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.container {
    display: flex;
    width: 900px;
    height: 500px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* LEFT SIDE */
.left {
    width: 50%;
    background: #f4f8fd;
    display: flex;
    align-items: center;
    justify-content: center;
}

.left img {
    width: 80%;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-box {
    width: 80%;
}

.login-box h2 {
    margin-bottom: 10px;
    color: #2c3e50;
}

.subtitle {
    font-size: 14px;
    color: gray;
    margin-bottom: 20px;
}

label {
    font-size: 14px;
    margin-top: 10px;
    display: block;
}

.input-box {
    margin-top: 5px;
    margin-bottom: 15px;
}

.input-box input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
}

.input-box input:focus {
    border-color: #2f6fed;
}

.extra {
    text-align: right;
    margin-bottom: 15px;
}

.extra a {
    font-size: 12px;
    text-decoration: none;
    color: #2f6fed;
}

button {
    width: 100%;
    padding: 12px;
    background: #2f6fed;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #1d4ed8;
}

.signup {
    margin-top: 15px;
    font-size: 13px;
    text-align: center;
}

.signup a {
    color: #2f6fed;
    text-decoration: none;
    font-weight: bold;
}

footer {
    margin-top: 15px;
    font-size: 12px;
    color: gray;
}
</style>

</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <!-- If using Flask -->
        <!-- <img src="{{ url_for('static', filename='gov.png') }}"> -->

        <!-- If opening directly -->
        <img src="gov.png" alt="illustration">
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="login-box">

            <h2>Login to Your Account</h2>
            <p class="subtitle">Access government schemes easily</p>

            <form method="POST">

                <label>Username</label>
                <div class="input-box">
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>

                <label>Password</label>
                <div class="input-box">
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="extra">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit">Login</button>

                <p class="signup">
                    Don't have an account?
                    <a href="/register">Sign Up Here</a>
                </p>

            </form>

        </div>
    </div>

</div>

<footer>
    Disclaimer: This is a helping platform created for informational purposes only and is not affiliated with the Government of India.
</footer>

</body>
</html>
