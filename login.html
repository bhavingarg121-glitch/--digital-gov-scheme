<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchemeSathi Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

  <!-- Glassmorphic Login Card -->
  <div class="backdrop-blur-lg bg-white/20 p-10 rounded-2xl shadow-xl w-full max-w-md">
    <h1 class="text-3xl font-bold text-center text-white mb-6">Welcome Back</h1>
    
    <form action="/login" method="POST" class="space-y-6">
      <div>
        <label class="block text-white font-medium mb-2">Email</label>
        <input type="email" name="email" required
          class="w-full px-4 py-2 rounded-lg bg-white/30 text-white placeholder-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-300">
      </div>
      
      <div>
        <label class="block text-white font-medium mb-2">Password</label>
        <input type="password" name="password" required
          class="w-full px-4 py-2 rounded-lg bg-white/30 text-white placeholder-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-300">
      </div>
      
      <button type="submit"
        class="w-full py-3 rounded-lg bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition">
        Login
      </button>
    </form>

    <p class="text-center text-gray-200 mt-6">
      Don’t have an account? 
      <a href="/register" class="text-yellow-300 font-semibold hover:underline">Register</a>
    </p>
  </div>
</body>
</html>
