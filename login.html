<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheme Sathi - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen flex items-center justify-center p-6">

  <!-- Login Card -->
  <div class="bg-white shadow-lg rounded-2xl w-full max-w-md p-8">

    <!-- Header -->
    <h1 class="text-3xl font-bold text-blue-900 text-center mb-2">Welcome Back</h1>
    <p class="text-gray-600 text-center mb-6">Login to access Scheme Sathi portal</p>

    <!-- Login Form -->
    <form id="loginForm" class="flex flex-col gap-5">
      
      <!-- Email -->
      <input type="email" 
             placeholder="Enter Email" 
             required
             class="border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">

      <!-- Password -->
      <input type="password" 
             placeholder="Enter Password" 
             required
             class="border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">

      <!-- Login Button -->
      <button type="submit" 
              class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold shadow hover:bg-blue-700 transition">
        Login
      </button>

      <!-- Create Account / Sign Up -->
      <a href="register.html" 
         class="block text-center text-blue-600 font-semibold hover:underline mt-2">
        Create Account / Sign Up
      </a>

      <!-- Skip for Now -->
      <a href="index.html" 
         class="block text-center text-gray-500 hover:text-gray-700 mt-1">
        Skip for now
      </a>

    </form>

  </div>

  <!-- Optional Script for Demo -->
  <script>
    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Login functionality not implemented yet!');
    });
  </script>

</body>
</html>
