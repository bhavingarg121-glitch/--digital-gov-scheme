<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SchemeSathi</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6 text-center">Login</h1>
    <form>
      <input type="email" placeholder="Email" class="w-full mb-4 px-3 py-2 border rounded">
      <input type="password" placeholder="Password" class="w-full mb-4 px-3 py-2 border rounded">
      <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
        Login
      </button>
    </form>
  </div>
</body>
</html>

  <script>
    async function sendOtp() {
      const phone = document.getElementById("phone").value;
      const res = await fetch("/api/send-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone })
      });
      const data = await res.json();
      alert(data.message);
    }

    async function verifyOtp() {
      const phone = document.getElementById("phone").value;
      const otp = document.getElementById("otp").value;
      const res = await fetch("/api/verify-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone, otp })
      });
      const data = await res.json();
      if (data.success) {
        alert("Login successful!");
        window.location.href = "dashboard.html"; // redirect to interface
      } else {
        alert("Invalid OTP.");
      }
    }

    async function registerUser() {
      const phone = document.getElementById("phone").value;
      const res = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone })
      });
      const data = await res.json();
      alert(data.message);
    }

    function skipLogin() {
      alert("Guest mode activated.");
      window.location.href = "dashboard.html"; // limited access interface
    }
  </script>
</body>
</html>
