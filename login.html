<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheme Sathi - Schemes</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen">

<!-- Navbar -->
<div class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold text-blue-900">Scheme Sathi</h1>
  <div id="userArea" class="flex items-center gap-4"></div>
</div>

<!-- Hero -->
<div class="bg-blue-100 text-center p-10 mt-4 rounded-lg shadow-md">
  <h2 class="text-3xl font-bold text-blue-900 mb-2">Explore Government Schemes</h2>
  <p class="text-gray-700">Browse scholarships, subsidies, pensions, and other benefits.</p>
</div>

<!-- Schemes Container -->
<div id="schemeContainer" class="grid md:grid-cols-3 gap-6 p-6"></div>

<script>
// Display logged-in user
const userArea = document.getElementById('userArea');
const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));

if (loggedInUser) {
  userArea.innerHTML = `
    <p class="text-gray-700">Hello, <span class="font-bold">${loggedInUser.name}</span></p>
    <button onclick="logout()" 
      class="ml-4 bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 transition">
      Logout
    </button>
  `;
} else {
  userArea.innerHTML = `
    <a href="login.html" class="text-blue-600 font-semibold hover:underline">Login</a>
    <a href="register.html" class="text-blue-600 font-semibold hover:underline">Sign Up</a>
  `;
}

function logout() {
  localStorage.removeItem('loggedInUser');
  window.location.reload();
}

// Load schemes.json dynamically
fetch('schemes.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('schemeContainer');
    container.innerHTML = "";
    data.forEach(scheme => {
      const card = document.createElement('div');
      card.className = "p-4 bg-white shadow rounded hover:shadow-lg transition";
      card.innerHTML = `
        <h3 class="font-bold text-lg">${scheme.name}</h3>
        <p class="text-gray-600 mt-1">${scheme.description}</p>
        <span class="inline-block mt-2 px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm">${scheme.category}</span>
        <button class="mt-3 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">Learn More</button>
      `;
      container.appendChild(card);
    });
  })
  .catch(err => {
    document.getElementById('schemeContainer').innerHTML =
      '<p class="text-red-500 text-center col-span-3">Failed to load schemes.</p>';
    console.error(err);
  });
</script>

</body>
</html>
