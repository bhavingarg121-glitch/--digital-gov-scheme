<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SchemeSathi</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6 text-center">Login</h1>
    <form id="loginForm">
      <input id="email" type="email" placeholder="Email" class="w-full mb-4 px-3 py-2 border rounded" required>
      <input id="password" type="password" placeholder="Password" class="w-full mb-4 px-3 py-2 border rounded" required>
      <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
        Login
      </button>
    </form>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault(); // stop page reload

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (data.success) {
          alert("Login successful!");
          window.location.href = "dashboard.html";
        } else {
          alert("Invalid credentials.");
        }
      } catch (err) {
        console.error(err);
        alert("Something went wrong. Please try again.");
      }
    });
  </script>
</body>
</html>
