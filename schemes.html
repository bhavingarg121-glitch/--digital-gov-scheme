<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Government Schemes</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #f0f4f8;
    }

    .scheme-card {
      transition: all 0.3s ease;
    }

    .scheme-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 12px 30px rgba(59,130,246,0.3);
    }
  </style>
</head>

<body class="font-sans text-gray-800">

  <!-- HEADER -->
  <header class="bg-white shadow py-4 px-6 sticky top-0 z-50">
    <h1 class="text-3xl font-bold text-blue-600">
      Government Schemes Portal
    </h1>
  </header>

  <!-- MAIN -->
  <main class="container mx-auto px-4 py-8">

    <!-- SEARCH + CATEGORY -->
    <div class="flex flex-wrap gap-4 justify-center mb-6">
      <input id="searchInput"
        type="text"
        placeholder="Search schemes..."
        class="border p-3 rounded w-60 focus:outline-none focus:ring-2 focus:ring-blue-400">

      <select id="categoryFilter"
        class="border p-3 rounded">
        <option value="all">All Categories</option>
      </select>
    </div>

    <!-- SCHEMES -->
    <div id="scheme-cards"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    </div>

    <!-- PAGINATION -->
    <div class="flex justify-center items-center gap-4 mt-8">
      <button id="prevBtn"
        class="px-4 py-2 bg-gray-300 rounded">
        Previous
      </button>

      <span id="pageNumber" class="font-bold text-lg"></span>

      <button id="nextBtn"
        class="px-4 py-2 bg-blue-500 text-white rounded">
        Next
      </button>
    </div>

  </main>

  <script>
    let allSchemes = [];
    let filteredSchemes = [];
    let currentPage = 1;
    const perPage = 20;

    const container = document.getElementById("scheme-cards");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");

    // 🔹 AUTO LOAD ON PAGE OPEN
    window.onload = () => {
      container.innerHTML =
        "<p class='text-blue-500 text-center col-span-3'>Loading schemes...</p>";

      fetch("./schemes.json")   // ✅ FIXED
        .then(res => res.json())
        .then(data => {
          allSchemes = data;
          filteredSchemes = data;

          loadCategories();
          displayPage();
        })
        .catch(() => {
          container.innerHTML =
            "<p class='text-red-500'>Failed to load schemes</p>";
        });
    };

    // 🔹 LOAD CATEGORY DROPDOWN
    function loadCategories() {
      const categories = [...new Set(allSchemes.map(s => s.category || "Other"))];

      categories.forEach(cat => {
        categoryFilter.innerHTML += `<option value="${cat}">${cat}</option>`;
      });
    }

    // 🔍 SEARCH
    searchInput.addEventListener("input", applyFilters);

    // 🏷 FILTER
    categoryFilter.addEventListener("change", applyFilters);

    function applyFilters() {
      const keyword = searchInput.value.toLowerCase();
      const selectedCategory = categoryFilter.value;

      filteredSchemes = allSchemes.filter(s => {
        const matchesSearch = (s.name || "").toLowerCase().includes(keyword);
        const matchesCategory =
          selectedCategory === "all" || s.category === selectedCategory;

        return matchesSearch && matchesCategory;
      });

      currentPage = 1;
      displayPage();
    }

    // 📄 DISPLAY PAGE
    function displayPage() {
      container.innerHTML = "";

      const start = (currentPage - 1) * perPage;
      const end = start + perPage;
      const pageData = filteredSchemes.slice(start, end);

      pageData.forEach(s => {
        container.innerHTML += `
          <div class="scheme-card bg-white p-6 rounded-xl shadow">

            <h3 class="text-xl font-bold text-blue-700 mb-2">
              ${s.name || "No Name"}
            </h3>

            <span class="text-sm text-gray-500">
              ${s.category || "General"}
            </span>

            <p class="text-gray-600 my-3">
              ${s.description || "No description"}
            </p>

            <a href="${s.link || '#'}" target="_blank"
              class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
              Learn More →
            </a>

          </div>
        `;
      });

      updatePagination();
    }

    // 🔁 PAGINATION
    document.getElementById("nextBtn").onclick = () => {
      currentPage++;
      displayPage();
    };

    document.getElementById("prevBtn").onclick = () => {
      currentPage--;
      displayPage();
    };

    function updatePagination() {
      const totalPages = Math.ceil(filteredSchemes.length / perPage);

      document.getElementById("pageNumber").innerText =
        `${currentPage} / ${totalPages}`;

      document.getElementById("prevBtn").disabled = currentPage === 1;
      document.getElementById("nextBtn").disabled = currentPage === totalPages;
    }
  </script>

</body>
</html>
