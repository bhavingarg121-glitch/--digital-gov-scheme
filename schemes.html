<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheme Sathi - Schemes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen flex flex-col items-center p-6">

  <!-- Header -->
  <header class="text-center mb-12">
    <h1 class="text-4xl font-bold text-blue-900">Scheme Sathi</h1>
    <p class="text-gray-700 mt-2" id="categoryTitle">Loading schemes...</p>
  </header>
  
  <main class="max-w-7xl mx-auto px-4">

    <!-- Category Selector -->
    <div class="flex gap-4 mb-4">
      <button class="category-btn px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600" data-file="education.json">Education</button>
      <button class="category-btn px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600" data-file="health.json">Health</button>
      <button class="category-btn px-4 py-2 bg-yellow-500 text-white rounded hover:bg-yellow-600" data-file="employment.json">Employment</button>
    </div>

    <!-- Search Bar -->
    <input id="search" type="text" placeholder="Search schemes..." class="border p-2 rounded mb-4 w-full">

    <!-- Scheme Cards Container -->
    <div id="scheme-cards" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- Pagination Controls -->
    <div class="flex justify-center items-center mt-6 gap-4">
      <button id="prevBtn" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">Prev</button>
      <span id="pageNumber">1 / 1</span>
      <button id="nextBtn" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">Next</button>
    </div>

  </main>

  <!-- JS Script -->
  <script>
    let allSchemes = [];
    let filteredSchemes = [];
    let currentPage = 1;
    const perPage = 24;

    // Load schemes JSON for selected category
    function loadCategory(file) {
      const container = document.getElementById("scheme-cards");
      container.innerHTML = "<p class='text-blue-500 text-center col-span-3'>Loading schemes...</p>";
      currentPage = 1;
      document.getElementById("search").value = ""; // Reset search

      fetch(`./${file}`)
        .then(res => res.json())
        .then(data => {
          allSchemes = data;
          filteredSchemes = data;
          displayPage();
          updateButtons();
        })
        .catch(err => {
          container.innerHTML = "<p class='text-red-500 text-center'>Failed to load schemes</p>";
          console.error(err);
        });
    }

    function displayPage() {
      const container = document.getElementById("scheme-cards");
      container.innerHTML = "";

      const start = (currentPage - 1) * perPage;
      const end = start + perPage;
      const pageData = filteredSchemes.slice(start, end);

      if (pageData.length === 0) {
        container.innerHTML = `<p class="text-gray-500 col-span-3 text-center">No schemes found</p>`;
        document.getElementById("pageNumber").innerText = `0 / 0`;
        return;
      }

      let cardsHTML = "";
      pageData.forEach(s => {
        cardsHTML += `
          <div class="scheme-card bg-white p-6 rounded-xl shadow hover:shadow-lg transition transform hover:-translate-y-1">
            <h3 class="text-lg font-bold text-blue-700 mb-2">${s.name}</h3>
            <p class="text-gray-600 mb-2">${s.description || "No description available"}</p>
            <p class="text-sm text-gray-500 mb-3">${s.category || "General"}</p>
            <a href="${s.link || '#'}" target="_blank" class="text-blue-600 font-semibold hover:underline">
              Learn More →
            </a>
          </div>
        `;
      });

      container.innerHTML = cardsHTML;

      const totalPages = Math.ceil(filteredSchemes.length / perPage);
      document.getElementById("pageNumber").innerText = `${currentPage} / ${totalPages}`;

      updateButtons();
    }

    function updateButtons() {
      const totalPages = Math.ceil(filteredSchemes.length / perPage);
      document.getElementById("prevBtn").disabled = currentPage === 1;
      document.getElementById("nextBtn").disabled = currentPage === totalPages || totalPages === 0;
    }

    document.getElementById("nextBtn").onclick = () => {
      const totalPages = Math.ceil(filteredSchemes.length / perPage);
      if (currentPage < totalPages) {
        currentPage++;
        displayPage();
      }
    };

    document.getElementById("prevBtn").onclick = () => {
      if (currentPage > 1) {
        currentPage--;
        displayPage();
      }
    };

    document.getElementById("search").addEventListener("input", e => {
      const query = e.target.value.toLowerCase();

      filteredSchemes = allSchemes.filter(s =>
        s.name.toLowerCase().includes(query) ||
        (s.description && s.description.toLowerCase().includes(query)) ||
        (s.category && s.category.toLowerCase().includes(query))
      );

      currentPage = 1;
      displayPage();
    });

    <script>
    // Get the category from URL
    const params = new URLSearchParams(window.location.search);
    const category = params.get('category');

    // Set category title
    const titleEl = document.getElementById('categoryTitle');
    titleEl.textContent = category ? `Schemes for ${category}` : 'All Schemes';

    const container = document.getElementById('schemeContainer');

    // Fetch schemes.json
    fetch('schemes.json')
      .then(res => res.json())
      .then(data => {
        // Get schemes of this category
        const schemes = category ? data[category] || [] : [];
        container.innerHTML = '';

        if (schemes.length === 0) {
          container.innerHTML = '<p class="text-center text-red-500 col-span-full">No schemes found for this category.</p>';
          return;
        }

        schemes.forEach(scheme => {
          const card = document.createElement('div');
          card.className = 'scheme-card bg-white p-6 rounded-lg shadow hover:shadow-xl transition transform hover:-translate-y-2';

          card.innerHTML = `
            <h3 class="text-xl font-bold mb-2">${scheme.name}</h3>
            <p class="text-gray-700 mb-4">${scheme.description}</p>
            ${scheme.link ? `<a href="${scheme.link}" target="_blank" class="inline-block mt-2 px-4 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 transition">Learn More</a>` : ''}
          `;

          container.appendChild(card);
        });
      })
      .catch(err => {
        container.innerHTML = '<p class="text-center text-red-500 col-span-full">Failed to load schemes.</p>';
        console.error(err);
      });
  </script>

</body>
</html>
