<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Schemes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold text-center mb-6">
  Government Schemes
</h1>

<!-- BACK BUTTON -->
<div class="text-center mb-4">
  <a href="index.html" class="text-blue-500 underline">← Back to Home</a>
</div>

<!-- SEARCH -->
<div class="text-center mb-6">
  <input id="searchInput"
    type="text"
    placeholder="Search schemes..."
    class="px-4 py-2 border rounded w-80">
</div>

<!-- GRID -->
<div id="scheme-cards"
  class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
</div>

<script>
let allSchemes = [];

// LOAD AUTOMATICALLY
window.onload = () => {
  fetch("schemes.json")
    .then(res => res.json())
    .then(data => {
      allSchemes = data;
      display(data);
    });
};

// DISPLAY
function display(data) {
  const container = document.getElementById("scheme-cards");
  container.innerHTML = "";

  data.forEach(s => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded shadow">
        <h3 class="font-bold">${s.name}</h3>
        <p>${s.description}</p>
        <a href="${s.link}" target="_blank" class="text-blue-500">View</a>
      </div>
    `;
  });
}

// SEARCH
document.getElementById("searchInput").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  const filtered = allSchemes.filter(s =>
    s.name.toLowerCase().includes(val)
  );

  display(filtered);
});
</script>

</body>
</html>
