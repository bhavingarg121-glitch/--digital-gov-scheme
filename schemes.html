<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Central Schemes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Header -->
  <header class="bg-white shadow py-4 px-6">
    <h1 class="text-3xl font-bold text-blue-600">Central Government Schemes</h1>
  </header>

  <!-- Main content -->
  <main class="container mx-auto px-4 py-8">
    
    <!-- Search -->
    <input type="text" id="search" placeholder="Search schemes..." class="mb-6 p-2 border rounded w-full">

    <!-- Schemes Grid -->
    <div id="scheme-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- Pagination -->
    <div class="flex justify-center items-center gap-4 mt-8">
      <button id="prevBtn" onclick="prevPage()" class="px-4 py-2 bg-gray-300 rounded">Previous</button>
      <span id="pageNumber" class="font-bold text-lg">1</span>
      <button id="nextBtn" onclick="nextPage()" class="px-4 py-2 bg-blue-500 text-white rounded">Next</button>
    </div>
  </main>

  <script>
    let allSchemes = [];
    let filteredSchemes = [];
    let currentPage = 1;
    const perPage = 4; // show 4 cards per page

    // Load schemes
    window.onload = function() {
      fetch("./schemes.json")
        .then(res => res.json())
        .then(data => {
          allSchemes = [];
          Object.keys(data).forEach(category => {
            data[category].forEach(scheme => {
              scheme.category = category;
              allSchemes.push(scheme);
            });
          });
          filteredSchemes = allSchemes;
          displayPage();
        })
        .catch(err => {
          console.error("Error loading schemes:", err);
          document.getElementById("scheme-cards").innerHTML =
            "<h2 class='text-red-500'>Failed to load schemes.</h2>";
        });
    };

    // Display schemes for current page
    function displayPage() {
      const container = document.getElementById("scheme-cards");
      container.innerHTML = "";

      const start = (currentPage - 1) * perPage;
      const end = start + perPage;
      const pageData = filteredSchemes.slice(start, end);

      const fragment = document.createDocumentFragment();
      pageData.forEach(s => {
        const card = document.createElement("div");
        card.className = "bg-white p-6 rounded shadow hover:shadow-lg transition transform hover:scale-105";
        card.innerHTML = `
          <h3 class="font-bold text-lg mb-1">${s.name}</h3>
          <span class="text-sm text-gray-500 mb-2 block">${s.category || ''}</span>
          <p class="text-gray-600 mb-2">${s.description || "No description available"}</p>
          <a href="${s.link || '#'}" target="_blank" class="text-blue-500 font-semibold">View</a>
        `;
        fragment.appendChild(card);
      });
      container.appendChild(fragment);

      updatePagination();
    }

    // Pagination controls
    function nextPage() {
      if (currentPage * perPage < filteredSchemes.length) {
        currentPage++;
        displayPage();
      }
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        displayPage();
      }
    }

    function updatePagination() {
      const totalPages = Math.ceil(filteredSchemes.length / perPage);
      document.getElementById("pageNumber").innerText = `${currentPage} / ${totalPages}`;
      document.getElementById("prevBtn").disabled = currentPage === 1;
      document.getElementById("nextBtn").disabled = currentPage === totalPages;
    }

    // Search functionality
    document.getElementById("search").addEventListener("input", e => {
      const query = e.target.value.toLowerCase();
      filteredSchemes = allSchemes.filter(s => s.name.toLowerCase().includes(query));
      currentPage = 1;
      displayPage();
    });
  </script>

</body>
</html>
