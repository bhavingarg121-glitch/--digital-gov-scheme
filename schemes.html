<script>
let allSchemes = [];
let currentPage = 1;
const perPage = 20;

// LOAD DATA
window.onload = function () {
  fetch("schemes.json")
    .then(response => response.json())
    .then(data => {
      console.log("Loaded:", data.length); // DEBUG
      allSchemes = data;
      displayPage();
    })
    .catch(error => {
      console.error("Error loading JSON:", error);
    });
};

// DISPLAY FUNCTION
function displayPage() {
  const container = document.getElementById("scheme-cards");
  container.innerHTML = "";

  if (!allSchemes || allSchemes.length === 0) {
    container.innerHTML = "<p>No schemes found</p>";
    return;
  }

  const start = (currentPage - 1) * perPage;
  const end = start + perPage;

  const pageData = allSchemes.slice(start, end);

  pageData.forEach(s => {
    const card = `
      <div class="bg-white p-4 rounded shadow">
        <h3 class="font-bold text-lg">${s.name}</h3>
        <p class="text-gray-600">${s.description}</p>
        <a href="${s.link}" target="_blank" class="text-blue-500">View</a>
      </div>
    `;
    container.innerHTML += card;
  });

  document.getElementById("pageNumber").innerText = currentPage;
}

// NEXT
function nextPage() {
  if (currentPage * perPage < allSchemes.length) {
    currentPage++;
    displayPage();
  }
}

// PREVIOUS
function prevPage() {
  if (currentPage > 1) {
    currentPage--;
    displayPage();
  }
}
</script>
