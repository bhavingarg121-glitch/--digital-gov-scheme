<script>
let allSchemes = [];
let currentPage = 1;
const perPage = 20;

window.onload = function () {
  fetch("schemes.json")
    .then(res => res.json())
    .then(data => {
      console.log("DATA LOADED:", data.length);
      allSchemes = data;
      displayPage();
    })
    .catch(err => {
      console.error("FETCH ERROR:", err);
      document.body.innerHTML = "<h1>Error loading data</h1>";
    });
};

function displayPage() {
  const container = document.getElementById("scheme-cards");

  if (!container) {
    console.error("scheme-cards div not found ❌");
    return;
  }

  container.innerHTML = "";

  const start = (currentPage - 1) * perPage;
  const end = start + perPage;

  const pageData = allSchemes.slice(start, end);

  pageData.forEach(s => {
    container.innerHTML += `
      <div style="background:white;padding:15px;margin:10px;border-radius:8px;">
        <h3>${s.name}</h3>
        <p>${s.description}</p>
        <a href="${s.link}" target="_blank">View</a>
      </div>
    `;
  });

  const pageNum = document.getElementById("pageNumber");
  if (pageNum) pageNum.innerText = currentPage;
}

function nextPage() {
  if (currentPage * perPage < allSchemes.length) {
    currentPage++;
    displayPage();
  }
}

function prevPage() {
  if (currentPage > 1) {
    currentPage--;
    displayPage();
  }
}
</script>
