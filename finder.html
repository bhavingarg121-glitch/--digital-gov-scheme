<!DOCTYPE html>
<html>
<head>
<title>Scheme AI Assistant</title>

<style>
body {
  font-family: Arial;
  background: #f1f5f9;
  margin: 0;
}

.chat-container {
  max-width: 600px;
  margin: auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: #0b5ed7;
  color: white;
  padding: 15px;
  text-align: center;
}

.chat-box {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.msg {
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #0b5ed7;
  color: white;
  margin-left: auto;
}

.bot {
  background: #e2e8f0;
}

.input-box {
  display: flex;
  padding: 10px;
  background: white;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  background: #0b5ed7;
  color: white;
  border: none;
  padding: 10px;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">🤖 Scheme AI Assistant</div>

<div id="chat" class="chat-box"></div>

<div class="input-box">
  <input id="input" placeholder="Type your answer...">
  <button onclick="send()">Send</button>
</div>

</div>

<script>

let step = 0;

const questions = [
  "What is your age?",
  "What is your annual income?",
  "What is your occupation? (farmer/student/business)",
  "Which state do you belong to?"
];

let user = {};

function addMessage(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// Start
addMessage(questions[0], "bot");

async function send(){

  const input = document.getElementById("input");
  const value = input.value;

  if(!value) return;

  addMessage(value, "user");

  // save answers
  if(step === 0) user.age = Number(value);
  if(step === 1) user.income = Number(value);
  if(step === 2) user.occupation = value;
  if(step === 3) user.state = value;

  input.value = "";

  step++;

  if(step < questions.length){
    setTimeout(()=> addMessage(questions[step], "bot"), 500);
  } else {

    addMessage("🔍 Finding best schemes...", "bot");

    const res = await fetch("http://localhost:3000/api/find",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(user)
    });

    const data = await res.json();

    data.forEach(s => {
      addMessage(`✅ ${s.name}\n${s.description}`, "bot");
    });
  }
}

</script>

</body>
</html>
