<!DOCTYPE html>
<html>
<head>
<title>SchemeSathi AI</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  margin: 0;
  background: #0f172a;
  color: white;
}

/* NAVBAR */
.navbar {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* HERO */
.hero {
  text-align:center;
  margin-top:40px;
}

.hero h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 25px;
  margin-top: 25px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* OPTIONS */
.options button {
  padding:12px 20px;
  margin:8px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.options button:hover {
  background:#6366f1;
  transform:scale(1.05);
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

/* RESULT GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* SCHEME CARD */
.scheme {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  transition:0.3s;
}

.scheme:hover {
  transform:translateY(-5px);
}

/* SECTION TITLE */
.section-title {
  margin-top:40px;
  font-size:1.5rem;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div>🏛 SchemeSathi</div>
  <div id="welcome">User</div>
</div>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>🚀 AI Scheme Finder</h1>
    <p>Find government schemes tailored for you</p>
  </div>

  <!-- AI FORM -->
  <div class="card">
    <h2 id="question"></h2>
    <div id="options" class="options"></div>
    <button id="nextBtn" onclick="nextStep()" style="display:none;">Next →</button>
  </div>

  <!-- RESULTS -->
  <div>
    <div class="section-title">📊 Results</div>
    <div id="results" class="grid"></div>
  </div>

  <!-- RECOMMEND -->
  <div>
    <div class="section-title">🧠 Recommended For You</div>
    <div id="recommend" class="grid"></div>
  </div>

  <!-- HISTORY -->
  <div>
    <div class="section-title">🕓 Recent Activity</div>
    <div id="history" class="card"></div>
  </div>

</div>

</body>
</html>
