<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Scheme Finder</title>

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #6366f1;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #4f46e5;
}

.scheme {
  background: #334155;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  transition: 0.3s;
}

.scheme:hover {
  transform: translateY(-5px);
}

.counter {
  font-size: 2rem;
  font-weight: bold;
  text-align: center;
}

a {
  color: #a5b4fc;
}
</style>
</head>

<body>
<div class="container">
  <h1>🚀 AI Scheme Finder</h1>

  <div class="card">
    <h3>User Details</h3>

    <select id="category">
      <option value="farmer">Farmer</option>
      <option value="student">Student</option>
      <option value="business">Business</option>
      <option value="woman">Woman</option>
    </select>

    <input type="number" id="income" placeholder="Annual Income">
    <button onclick="findSchemes()">Find Schemes</button>
  </div>

  <div class="card">
    <h3>Results</h3>
    <div id="results"></div>
  </div>

  <div class="card">
    <h3>Platform Stats</h3>
    <div class="counter" id="count">0</div>
  </div>
</div>

<script>
async function findSchemes() {
  const category = document.getElementById('category').value;
  const income = document.getElementById('income').value;

  const res = await fetch('http://localhost:3000/api/schemes', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ category, income })
  });

  const data = await res.json();

  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '';

  if(data.length === 0){
    resultsDiv.innerHTML = "<p>No schemes found</p>";
    return;
  }

  data.forEach(s => {
    resultsDiv.innerHTML += `
      <div class="scheme">
        <h4>${s.name}</h4>
        <p>${s.description}</p>
        <a href="${s.link}" target="_blank">Apply →</a>
      </div>
    `;
  });
}

// Animated Counter
let count = 0;
setInterval(() => {
  if (count < 1000) {
    count += 10;
    document.getElementById('count').innerText = count + '+ Schemes';
  }
}, 30);
</script>

</body>
</html>
