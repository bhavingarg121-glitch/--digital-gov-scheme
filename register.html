<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheme Sathi - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen flex items-center justify-center p-6">

  <!-- Register Card -->
  <div class="bg-white shadow-lg rounded-2xl w-full max-w-md p-8">

    <!-- Header -->
    <h1 class="text-3xl font-bold text-blue-900 text-center mb-2">Create Account</h1>
    <p class="text-gray-600 text-center mb-6">Sign up to access Scheme Sathi portal</p>

   <form id="registerForm" class="flex flex-col gap-5">
      <input type="text" placeholder="Full Name" required
             class="border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <input type="email" placeholder="Email Address" required
             class="border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <input type="password" placeholder="Password" required
             class="border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <input type="password" placeholder="Confirm Password" required
             class="border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button type="submit"
              class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold shadow hover:bg-blue-700 transition">
        Sign Up
      </button>

      <p class="text-center text-gray-500">
        Already have an account? 
        <a href="login.html" class="text-blue-600 font-semibold hover:underline">Login</a>
      </p>

      <a href="index.html" class="block text-center text-gray-500 hover:text-gray-700 mt-1">
        Skip for now
      </a>
    </form>

  </div>

  <!-- Optional Script -->
  <script>
        const registerForm = document.getElementById('registerForm');
    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      // Redirect to index.html after "signup"
      window.location.href = "index.html";
    });

  </script>

</body>
</html>
