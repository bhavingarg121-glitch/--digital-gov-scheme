<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchemeSathi Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #00c6ff, #0072ff, #8e2de2, #ff6a00);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass-card {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.25);
      border-radius: 1.5rem;
      padding: 3rem;
      width: 90%;
      max-width: 800px;
      text-align: center;
      color: #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.4);
      animation: fadeIn 1s ease-in-out;
    }

    .glass-card h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #ff6a00, #ee0979);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .glass-card p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }

    .form-label {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: block;
      text-align: left;
      color: #fff;
    }

    .form-input {
      font-size: 1.1rem;
      padding: 1rem;
      border-radius: 0.75rem;
      width: 100%;
      background: rgba(255,255,255,0.9);
      color: #333;
      border: none;
      margin-bottom: 1.5rem;
      outline: none;
      transition: box-shadow 0.3s ease;
    }

    .form-input:focus {
      box-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    .btn {
      font-size: 1.3rem;
      padding: 1rem 2rem;
      border-radius: 999px;
      font-weight: 600;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: #fff;
      border: none;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      width: 100%;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #successToast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #22c55e;
      color: #fff;
      padding: 1rem 1.5rem;
      border-radius: 0.75rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      font-size: 1.1rem;
      display: none;
    }
  </style>
</head>
<body>

  <div class="glass-card">
    <h1>Create Account</h1>
    <p>Join us and access government schemes</p>

    <form id="registerForm" action="/register" method="POST">
      <label class="form-label">Email</label>
      <input type="email" name="email" required class="form-input">

      <label class="form-label">Password</label>
      <input type="password" id="password" name="password" required class="form-input">

      <label class="form-label">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password" required class="form-input">

      <p id="errorMessage" class="text-red-500 text-lg hidden"></p>

      <button type="submit" class="btn">Register</button>
    </form>

    <p class="mt-6 text-lg">
      Already have an account?
      <a href="/login" class="text-blue-700 font-semibold hover:underline">Login</a>
    </p>
  </div>

  <div id="successToast">🎉 Registration successful! Redirecting...</div>

  <script>
    const form = document.getElementById("registerForm");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirm_password");
    const errorMessage = document.getElementById("errorMessage");
    const successToast = document.getElementById("successToast");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      errorMessage.classList.add("hidden");
      errorMessage.textContent = "";

      if (password.value.length < 6) {
        errorMessage.textContent = "Password must be at least 6 characters long.";
        errorMessage.classList.remove("hidden");
        return;
      }

      if (password.value !== confirmPassword.value) {
        errorMessage.textContent = "Passwords do not match.";
        errorMessage.classList.remove("hidden");
        return;
      }

      const formData = new FormData(form);
      const response = await fetch("/register", {
        method: "POST",
        body: formData
      });

      const result = await response.text();

      if (result.includes("successful")) {
        successToast.style.display = "block";
        setTimeout(() => {
          successToast.style.display = "none";
          window.location.href = "/login";
        }, 2000);
      } else {
        errorMessage.textContent = result;
        errorMessage.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
