<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - SchemeSathi</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#ff6a00,#ee0979,#667eea);
  background-size: 300% 300%;
  animation: gradient 8s ease infinite;
}

@keyframes gradient {
  0% {background-position:0%}
  50% {background-position:100%}
  100% {background-position:0%}
}

.glass {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.2);
  border-radius: 1.5rem;
  padding: 2rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="glass w-full max-w-md text-white">

<h1 class="text-3xl font-bold mb-2 text-center">Create Account</h1>

<form id="registerForm">

<input type="text" id="name" placeholder="Full Name"
class="w-full p-3 rounded mb-4 text-black" required>

<input type="email" id="email" placeholder="Email"
class="w-full p-3 rounded mb-4 text-black" required>

<input type="password" id="password" placeholder="Password"
class="w-full p-3 rounded mb-4 text-black" required>

<p id="error" class="text-red-300 mb-2 hidden"></p>

<button class="w-full bg-pink-600 p-3 rounded hover:bg-pink-700">
Register
</button>

</form>

<p class="mt-4 text-center">
Already have an account?
<a href="login.html" class="underline font-semibold">Login</a>
</p>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const error = document.getElementById("error");

  if(password.length < 6){
    error.textContent = "Password must be at least 6 characters";
    error.classList.remove("hidden");
    return;
  }

  const user = { name, email, password };

  localStorage.setItem("user", JSON.stringify(user));

  alert("Registration successful!");
  window.location.href = "login.html";

});

</script>

</body>
</html>
