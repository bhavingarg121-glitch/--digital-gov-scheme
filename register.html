<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #e6eef8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.container {
    display: flex;
    width: 900px;
    height: 550px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* LEFT SIDE */
.left {
    width: 50%;
    background: #f4f8fd;
    display: flex;
    align-items: center;
    justify-content: center;
}

.left img {
    width: 80%;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.register-box {
    width: 80%;
}

.register-box h2 {
    margin-bottom: 10px;
    color: #2c3e50;
}

.subtitle {
    font-size: 14px;
    color: gray;
    margin-bottom: 20px;
}

label {
    font-size: 14px;
    margin-top: 10px;
    display: block;
}

.input-box {
    margin-top: 5px;
    margin-bottom: 12px;
}

.input-box input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
}

.input-box input:focus {
    border-color: #2f6fed;
}

button {
    width: 100%;
    padding: 12px;
    background: #2f6fed;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
}

button:hover {
    background: #1d4ed8;
}

.login-link {
    margin-top: 15px;
    font-size: 13px;
    text-align: center;
}

.login-link a {
    color: #2f6fed;
    text-decoration: none;
    font-weight: bold;
}

footer {
    margin-top: 15px;
    font-size: 12px;
    color: gray;
}
</style>

</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <img src="gov.png" alt="illustration">
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="register-box">

            <h2>Create Account</h2>
            <p class="subtitle">Register to access government schemes</p>

            <form method="POST">

                <label>Username</label>
                <div class="input-box">
                    <input type="text" name="username" placeholder="Enter username" required>
                </div>

                <label>Email</label>
                <div class="input-box">
                    <input type="email" name="email" placeholder="Enter email" required>
                </div>

                <label>Password</label>
                <div class="input-box">
                    <input type="password" name="password" placeholder="Enter password" required>
                </div>

                <label>Confirm Password</label>
                <div class="input-box">
                    <input type="password" name="confirm_password" placeholder="Confirm password" required>
                </div>

                <button type="submit">Register</button>

                <p class="login-link">
                    Already have an account?
                    <a href="/login">Login Here</a>
                </p>

            </form>

        </div>
    </div>

</div>

<footer>
    Disclaimer: This is a helping platform created for informational purposes only and is not affiliated with the Government of India.
</footer>

</body>
</html>
