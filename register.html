<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - SchemeSathi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6 text-center">Register</h1>
    <div id="notification" class="text-center text-sm mb-4"></div>

    <form id="registerForm">
      <input
        type="email"
        id="email"
        placeholder="Email"
        class="w-full mb-4 px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500"
        required
      />
      <input
        type="password"
        id="password"
        placeholder="Password"
        class="w-full mb-4 px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500"
        required
      />
      <input
        type="text"
        id="phone"
        placeholder="Phone (optional)"
        class="w-full mb-4 px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500"
      />
      <button
        type="submit"
        class="w-full py-2 bg-green-600 text-white rounded hover:bg-green-700 transition"
      >
        Register
      </button>
    </form>

    <button
      onclick="window.location.href='index.html'"
      class="w-full mt-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-700 transition"
    >
      Back to Login
    </button>
  </div>

  <script>
    const form = document.getElementById("registerForm");
    const notification = document.getElementById("notification");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const phone = document.getElementById("phone").value;

      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, phone }),
        });
        const data = await res.json();
        notification.textContent = data.message;

        if (data.success) {
          notification.className = "text-green-600 font-semibold mb-4";
          sessionStorage.removeItem("guestMode");
          sessionStorage.setItem("authToken", "true");

          // Redirect after 2 seconds
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 2000);
        } else {
          notification.className = "text-red-600 font-semibold mb-4";
        }
      } catch (err) {
        notification.textContent = "Error registering. Please try again.";
        notification.className = "text-red-600 font-semibold mb-4";
      }
    });
  </script>
</body>
</html>
