<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchemeSathi Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-green-400 via-blue-500 to-purple-600 min-h-screen flex items-center justify-center">

  <!-- Glassmorphic Register Card -->
  <div class="backdrop-blur-lg bg-white/20 p-10 rounded-2xl shadow-xl w-full max-w-md">
    <h1 class="text-3xl font-bold text-center text-white mb-6">Create Account</h1>
    
    <form id="registerForm" action="/register" method="POST" class="space-y-6">
      <div>
        <label class="block text-white font-medium mb-2">Email</label>
        <input type="email" name="email" required
          class="w-full px-4 py-2 rounded-lg bg-white/30 text-white placeholder-gray-200 focus:outline-none focus:ring-2 focus:ring-green-300">
      </div>
      
      <div>
        <label class="block text-white font-medium mb-2">Password</label>
        <input type="password" id="password" name="password" required
          class="w-full px-4 py-2 rounded-lg bg-white/30 text-white placeholder-gray-200 focus:outline-none focus:ring-2 focus:ring-green-300">
      </div>
      
      <div>
        <label class="block text-white font-medium mb-2">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required
          class="w-full px-4 py-2 rounded-lg bg-white/30 text-white placeholder-gray-200 focus:outline-none focus:ring-2 focus:ring-green-300">
      </div>
      
      <!-- Error Message -->
      <p id="errorMessage" class="text-red-300 text-sm hidden"></p>
      
      <button type="submit"
        class="w-full py-3 rounded-lg bg-green-600 text-white font-semibold hover:bg-green-700 transition">
        Register
      </button>
    </form>

    <p class="text-center text-gray-200 mt-6">
      Already have an account? 
      <a href="/login" class="text-yellow-300 font-semibold hover:underline">Login</a>
    </p>
  </div>

  <!-- Success Toast -->
  <div id="successToast" class="fixed bottom-5 right-5 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg hidden">
    🎉 Registration successful! Redirecting...
  </div>

  <!-- JavaScript Validation + Success Popup -->
  <script>
    const form = document.getElementById("registerForm");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirm_password");
    const errorMessage = document.getElementById("errorMessage");
    const successToast = document.getElementById("successToast");

    form.addEventListener("submit", function(event) {
      errorMessage.classList.add("hidden");
      errorMessage.textContent = "";

      if (password.value.length < 6) {
        event.preventDefault();
        errorMessage.textContent = "Password must be at least 6 characters long.";
        errorMessage.classList.remove("hidden");
        return;
      }

      if (password.value !== confirmPassword.value) {
        event.preventDefault();
        errorMessage.textContent = "Passwords do not match.";
        errorMessage.classList.remove("hidden");
        return;
      }

      // Show success toast
      event.preventDefault(); // prevent actual submission for demo
      successToast.classList.remove("hidden");

      // Hide after 3 seconds and redirect
      setTimeout(() => {
        successToast.classList.add("hidden");
        window.location.href = "/login"; // redirect to login page
      }, 3000);
    });
  </script>
</body>
</html>
