<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-6">Admin Dashboard</h1>

<!-- ADD SCHEME -->
<div class="bg-white p-4 rounded shadow mb-6 w-96">
  <h2 class="font-bold mb-3">Add Scheme</h2>

  <input id="name" placeholder="Name" class="border p-2 w-full mb-2">
  <input id="desc" placeholder="Description" class="border p-2 w-full mb-2">
  <input id="cat" placeholder="Category" class="border p-2 w-full mb-2">
  <input id="link" placeholder="Link" class="border p-2 w-full mb-2">

  <button onclick="addScheme()" class="bg-green-500 text-white px-4 py-2 rounded">
    Add Scheme
  </button>
</div>

<!-- SCHEME LIST -->
<div id="adminSchemes" class="grid md:grid-cols-3 gap-4"></div>

<script>
const token = localStorage.getItem("token");

// protect admin page
if (!token) {
  window.location.href = "login.html";
}

// LOAD ALL SCHEMES
fetch("http://127.0.0.1:5000/api/schemes")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("adminSchemes");

    data.forEach(s => {
      container.innerHTML += `
        <div class="bg-white p-4 rounded shadow">
          <h3 class="font-bold">${s.name}</h3>
          <p>${s.description}</p>
        </div>
      `;
    });
  });

// ADD SCHEME
function addScheme() {
  fetch("http://127.0.0.1:5000/api/admin/add-scheme", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      description: document.getElementById("desc").value,
      category: document.getElementById("cat").value,
      link: document.getElementById("link").value
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("Scheme added!");
    location.reload();
  });
}
</script>

</body>
</html>
