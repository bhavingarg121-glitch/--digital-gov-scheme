<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pensioners - Scheme Sathi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<script>
function toggleContent(id){
  const all=document.querySelectorAll('.scheme-details');
  all.forEach(s=>{ if(s.id!==id) s.classList.add('hidden'); });
  document.getElementById(id).classList.toggle('hidden');
}
</script>
</head>

<body class="bg-gray-100">

<header class="bg-blue-900 text-white p-4">
<h1 class="text-xl font-bold">Pensioner Schemes</h1>
</header>

<main class="p-6 space-y-6 max-w-6xl mx-auto">

<!-- PMVVY -->
<div class="bg-white shadow rounded">
<div class="p-4 flex justify-between">
<h3>PM Vaya Vandana Yojana</h3>
<button onclick="toggleContent('p1')">View</button>
</div>
<div id="p1" class="hidden p-4">
<p>Pension plan for senior citizens.</p>
<a href="https://licindia.in" class="text-blue-500">Official Website</a>
</div>
</div>

<!-- APY -->
<div class="bg-white shadow rounded">
<div class="p-4 flex justify-between">
<h3>Atal Pension Yojana</h3>
<button onclick="toggleContent('p2')">View</button>
</div>
<div id="p2" class="hidden p-4">
<p>Retirement savings scheme.</p>
<a href="https://npscra.nsdl.co.in" class="text-blue-500">Official Website</a>
</div>
</div>

</main>
</body>
</html>
