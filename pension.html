<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pension Schemes</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .scheme-card {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
    }
    .scheme-card h2 { margin: 0 0 10px; }
    .scheme-card a { color: blue; text-decoration: none; }
    .scheme-card a:hover { text-decoration: underline; }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 15px;
      background: #0078d7;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }
    .back-link:hover { background: #005a9e; }
  </style>
</head>
<body>
  <h1>Pension Schemes</h1>
  <div id="schemes"></div>

  <a href="index.html" class="back-link">← Back to Home</a>

  <script>
   fetch("pension.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("schemes");
    container.innerHTML = "";

    data.forEach(scheme => {
      const card = document.createElement("div");
      card.className = "scheme-card";

      card.innerHTML = `
        <h2>${scheme.name || "No Title"}</h2>
        <p><strong>State:</strong> ${scheme.state || "N/A"}</p>
        <p><strong>Category:</strong> ${scheme.category || "N/A"}</p>
        <p>${scheme.description || "No description"}</p>
        <p><strong>Eligibility:</strong> ${scheme.eligibility || "N/A"}</p>
        <p><strong>Amount:</strong> ${scheme.amount || "N/A"}</p>
        <a href="${scheme.link || "#"}" target="_blank">Learn More</a>
      `;

      container.appendChild(card);
    });
  })
  .catch(err => {
    document.getElementById("schemes").innerText = "Failed to load.";
    console.error(err);
  });
  </script>
</body>
</html>
