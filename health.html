<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Schemes</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 text-gray-800">

  <!-- Header -->
  <header class="bg-blue-600 text-white p-4 shadow-md">
    <h1 class="text-2xl font-bold text-center">Health Schemes</h1>
  </header>

  <!-- Search Bar -->
  <div class="p-4 max-w-4xl mx-auto">
    <input 
      id="search" 
      type="text" 
      placeholder="Search health schemes..." 
      class="w-full p-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-400"
    >
  </div>

  <!-- Schemes Container -->
  <div id="schemes-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 p-6 max-w-6xl mx-auto">
    <!-- Cards will load here -->
  </div>

  <!-- Footer -->
  <footer class="bg-blue-600 text-white text-center p-3 mt-6">
    <p>© 2026 Scheme Sathi | Health विभाग</p>
  </footer>

  <!-- JavaScript -->
  <script>
    let schemes = [];

    // Fetch JSON
    fetch("health.json")
      .then(res => res.json())
      .then(data => {
        schemes = data;
        displaySchemes(schemes);
      })
      .catch(err => {
        document.getElementById("schemes-container").innerHTML =
          "<p class='text-red-500'>Failed to load data. Check JSON path.</p>";
      });

    // Display Schemes
    function displaySchemes(data) {
      const container = document.getElementById("schemes-container");
      container.innerHTML = "";

      if (data.length === 0) {
        container.innerHTML = "<p>No schemes found.</p>";
        return;
      }

      data.forEach(scheme => {
        const card = `
          <div class="bg-white p-5 rounded-2xl shadow-md hover:shadow-xl transform hover:-translate-y-1 transition duration-300">
            
            <h2 class="text-xl font-semibold mb-2 text-blue-700">
              ${scheme.name}
            </h2>
            
            <p class="text-gray-600 mb-4">
              ${scheme.description}
            </p>

            <a href="${scheme.link}" target="_blank"
              class="inline-block bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
              Learn More
            </a>
          </div>
        `;
        container.innerHTML += card;
      });
    }

    // Search Functionality
    document.getElementById("search").addEventListener("input", function () {
      const value = this.value.toLowerCase();

      const filtered = schemes.filter(scheme =>
        scheme.name.toLowerCase().includes(value) ||
        scheme.description.toLowerCase().includes(value)
      );

      displaySchemes(filtered);
    });
  </script>

</body>
</html>
