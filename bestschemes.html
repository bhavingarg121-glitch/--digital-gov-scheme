<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Schemes Showcase</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-r from-pink-50 via-purple-50 to-blue-50 min-h-screen">

  <!-- Hero Section -->
  <header class="text-center py-10">
    <h1 class="text-4xl font-bold text-gray-800">🌟 Best Government Schemes</h1>
    <p class="mt-2 text-gray-600">Explore flagship Central & State schemes across India</p>
  </header>

  <!-- Schemes Grid -->
  <main id="schemesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 px-6">
    <!-- Cards will be injected here -->
  </main>

  <!-- Footer -->
  <footer class="text-center py-6 mt-10 bg-gray-100">
    <p class="text-gray-600">SchemeSathi © 2026 | Powered by verified government portals</p>
  </footer>

  <!-- Script to Fetch JSON -->
  <script>
    async function loadSchemes() {
      try {
        const response = await fetch('bestschemes.json'); // Path to your JSON file
        const data = await response.json();

        const grid = document.getElementById('schemesGrid');
        grid.innerHTML = '';

        data.bestSchemes.forEach(scheme => {
          const card = document.createElement('div');
          card.className = "bg-white rounded-xl shadow-lg p-6 hover:shadow-2xl transition";

          card.innerHTML = `
            <h2 class="text-xl font-semibold text-indigo-700">${scheme.name}</h2>
            <p class="text-sm text-gray-600 mt-2">${scheme.category} | ${scheme.type}</p>
            <p class="mt-3 text-gray-700">${scheme.description}</p>
            <p class="mt-2 text-sm text-gray-500"><strong>Eligibility:</strong> ${scheme.eligibility}</p>
            <p class="mt-2 text-sm text-gray-500"><strong>Benefits:</strong> ${scheme.benefits}</p>
            <a href="${scheme.link}" target="_blank" class="mt-4 inline-block px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Apply / Learn More</a>
          `;

          grid.appendChild(card);
        });
      } catch (error) {
        console.error('Error loading schemes:', error);
      }
    }

    loadSchemes();
  </script>

</body>
</html>
