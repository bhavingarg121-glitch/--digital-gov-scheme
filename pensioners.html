<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pensioners - Scheme Sathi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<script>
function toggleContent(id){
  const all=document.querySelectorAll('.scheme-details');
  all.forEach(s=>{ if(s.id!==id) s.classList.add('hidden'); });
  document.getElementById(id).classList.toggle('hidden');
}
</script>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<header class="bg-blue-900 text-white px-6 py-4">
  <div class="flex justify-between">
    <h1 class="font-bold text-xl">Scheme Sathi</h1>
    <nav class="space-x-4">
      <a href="index.html">Home</a>
      <a href="farmers.html">Farmers</a>
      <a href="youth.html">Youth</a>
      <a href="msme.html">MSME</a>
    </nav>
  </div>
</header>

<main class="p-6 space-y-6 max-w-6xl mx-auto">

<!-- PMVVY -->
<div class="bg-white shadow-lg rounded">
<div class="p-4 flex justify-between">
<h3>PM Vaya Vandana Yojana</h3>
<button onclick="toggleContent('p1')" class="text-blue-600">View</button>
</div>
<div id="p1" class="scheme-details hidden p-4">
<p>Pension plan for senior citizens.</p>
<a href="https://licindia.in" target="_blank" class="text-blue-500">Official</a>
</div>
</div>

<!-- APY -->
<div class="bg-white shadow-lg rounded">
<div class="p-4 flex justify-between">
<h3>Atal Pension Yojana</h3>
<button onclick="toggleContent('p2')" class="text-blue-600">View</button>
</div>
<div id="p2" class="scheme-details hidden p-4">
<p>Guaranteed pension after retirement.</p>
<a href="https://npscra.nsdl.co.in" target="_blank" class="text-blue-500">Official</a>
</div>
</div>

</main>
</body>
</html>
