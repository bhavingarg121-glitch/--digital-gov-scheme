<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SchemeSathi - Explore</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

/* Navbar */
nav {
  background: linear-gradient(90deg, #4c1d95, #6d28d9);
}

/* Header */
header h1 {
  letter-spacing: -1px;
}

/* Sticky Bar Upgrade */
.sticky-bar {
  position: sticky;
  top: 10px;
  margin: 0 20px;
  border-radius: 1rem;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.8);
  z-index: 50;
  padding: 1rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* Inputs */
input, select {
  transition: 0.3s;
}

input:focus, select:focus {
  outline: none;
  border-color: #6c5ce7;
  box-shadow: 0 0 0 3px rgba(108,92,231,0.2);
}

/* Glass Cards (UPGRADED) */
.scheme-card {
  backdrop-filter: blur(14px);
  background: rgba(255,255,255,0.75);
  border-radius: 1.2rem;
  padding: 1.5rem;
  border: 1px solid rgba(255,255,255,0.4);

  transition: all 0.4s ease;
  transform: translateY(30px);
  opacity: 0;
  position: relative;
  overflow: hidden;
}

/* Glow effect */
.scheme-card::before {
  content: "";
  position: absolute;
  width: 120%;
  height: 120%;
  top: -50%;
  left: -50%;
  background: radial-gradient(circle, rgba(108,92,231,0.15), transparent);
  opacity: 0;
  transition: 0.5s;
}

.scheme-card:hover::before {
  opacity: 1;
}

/* Show animation */
.scheme-card.show {
  transform: translateY(0);
  opacity: 1;
}

/* Hover effect */
.scheme-card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
}

/* Badge */
.scheme-card span {
  display: inline-block;
  font-size: 11px;
  background: linear-gradient(90deg, #a78bfa, #6366f1);
  color: white;
  padding: 4px 10px;
  border-radius: 999px;
  text-transform: capitalize;
}

/* Button */
.scheme-card a {
  display: inline-block;
  transition: 0.3s;
}

.scheme-card a:hover {
  transform: translateY(-2px);
}

/* Top Button */
#topBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: linear-gradient(135deg, #6c5ce7, #4f46e5);
  color: white;
  padding: 12px 16px;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="bg-purple-900 text-white p-4 flex justify-between">
  <h1 class="text-xl font-bold">🏛️ SchemeSathi</h1>
</nav>

<!-- Header -->
<header class="text-center py-10">
  <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-600 to-indigo-600 text-transparent bg-clip-text">
    Explore Government Schemes
  </h1>
  <p class="text-gray-600 mt-2">Find the right scheme for you</p>
</header>

<!-- Sticky Search -->
<div class="sticky-bar flex flex-col md:flex-row gap-4 justify-center">
  <input id="searchInput"
    placeholder="🔍 Search schemes..."
    class="p-3 border rounded-lg w-full md:w-1/2">

  <select id="categorySelect" class="p-3 border rounded-lg">
    <option value="all">All Categories</option>
    <option value="housing">Housing</option>
    <option value="employment">Employment</option>
    <option value="agriculture">Agriculture</option>
    <option value="women">Women</option>
    <option value="energy">Energy</option>
    <option value="infrastructure">Infrastructure</option>
    <option value="business">Business</option>
    <option value="digital">Digital</option>
    <option value="rural">Rural</option>
    <option value="food">Food</option>
  </select>
</div>

<!-- Counter -->
<div id="schemeInfo" class="text-center mt-4 text-gray-600"></div>

<!-- Schemes -->
<div id="schemesContainer"
  class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-6">
</div>

<!-- Back to Top -->
<div id="topBtn" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</div>

<script>

let originalSchemes = [];
let filteredSchemes = [];
let currentIndex = 0;
const loadCount = 12;

const container = document.getElementById("schemesContainer");
const topBtn = document.getElementById("topBtn");


// 🔥 Load JSON
fetch("explore.json")
.then(res => {
  console.log("Fetch status:", res.status);
  if (!res.ok) throw new Error("JSON not found");
  return res.json();
})
.then(data => {
  console.log("Data loaded:", data);

  originalSchemes = data;
  expandSchemes();

  filteredSchemes = [...originalSchemes];
  loadMoreSchemes();
})
.catch(err => {
  console.error("ERROR:", err);

  container.innerHTML = `
    <p class="text-center text-red-500">
      Failed to load schemes. Check JSON path or server.
    </p>
  `;
});


// 🔥 Expand schemes (dummy data)
function expandSchemes(){
  const categories = ["housing","employment","agriculture","women","energy","infrastructure","business","digital","rural","food"];

  let expanded = [...originalSchemes];

  categories.forEach(cat=>{
    for(let i=1;i<=40;i++){
      expanded.push({
        name: `${cat.toUpperCase()} Development Scheme ${i}`,
        description: `This scheme supports ${cat} sector growth and development.`,
        link: "#",
        category: cat
      });
    }
  });

  originalSchemes = expanded;
}


// 🔥 Create card (better performance)
function createCard(scheme){
  return `
    <div class="scheme-card">
      
      <h3 class="font-semibold text-lg mb-2 text-gray-800">
        ${scheme.name}
      </h3>

      <p class="text-sm text-gray-600 mb-3 leading-relaxed">
        ${scheme.description}
      </p>

      <span class="text-xs bg-purple-100 text-purple-600 px-2 py-1 rounded">
        ${scheme.category}
      </span>

      <br><br>

      ${
        scheme.link && scheme.link !== "#"
        ? `<a href="${scheme.link}" target="_blank"
            class="bg-purple-600 text-white px-3 py-2 rounded-lg text-sm hover:bg-purple-700">
            Learn More →
          </a>`
        : `<span class="text-gray-400">No link available</span>`
      }

    </div>
  `;
}


// 🔥 Load more (optimized)
function loadMoreSchemes(){
  let next = filteredSchemes.slice(currentIndex, currentIndex + loadCount);

  let html = "";
  next.forEach(scheme => {
    html += createCard(scheme);
  });

  container.innerHTML += html;

  currentIndex += loadCount;

  updateCounter();
  revealCards();
}


// 🔥 Counter
function updateCounter(){
  document.getElementById("schemeInfo").innerText =
    `Showing 1–${Math.min(currentIndex, filteredSchemes.length)} of ${filteredSchemes.length} schemes`;
}


// 🔥 Reveal animation
function revealCards(){
  document.querySelectorAll(".scheme-card").forEach(card => {
    let top = card.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      card.classList.add("show");
    }
  });
}


// 🔥 Infinite scroll + top button
window.addEventListener("scroll", () => {

  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 100){
    if(currentIndex < filteredSchemes.length){
      loadMoreSchemes();
    }
  }

  topBtn.style.display = window.scrollY > 300 ? "block" : "none";
});


// 🔥 Filters
document.getElementById("searchInput").addEventListener("input", applyFilters);
document.getElementById("categorySelect").addEventListener("change", applyFilters);

function applyFilters(){
  let search = document.getElementById("searchInput").value.toLowerCase();
  let category = document.getElementById("categorySelect").value;

  filteredSchemes = originalSchemes.filter(s => {
    return (
      s.name.toLowerCase().includes(search) &&
      (category === "all" || s.category === category)
    );
  });

  container.innerHTML = "";
  currentIndex = 0;

  loadMoreSchemes();
}
</script>

</body>
</html>
